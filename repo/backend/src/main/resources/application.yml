spring:
  application:
    name: dojostay-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      # Phase 9 hardening: cap bulk-import and any future upload size at 5 MiB.
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        secure: false
  # Phase 9 hardening: reject oversized request bodies at the container edge
  # so a bad actor cannot wedge the JSON parser or the upload pipeline. These
  # are deliberately tight — lodging notes, post bodies, and import payloads
  # all fit inside 1 MiB, and CSV imports use the multipart path below.
  tomcat:
    max-http-form-post-size: 1048576
    max-swallow-size: 2097152
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

dojostay:
  security:
    lockout:
      max-failed-attempts: 5
      lock-duration-minutes: 15
    password:
      min-length: 12
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special: true
      history-size: 5
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173

logging:
  level:
    root: INFO
    com.dojostay: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
