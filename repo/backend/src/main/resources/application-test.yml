spring:
  datasource:
    url: jdbc:h2:mem:dojostay;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration

dojostay:
  bootstrap:
    seed-on-start: false
  security:
    # Deterministic 32-byte base64 AES-256 key for tests — never use in prod.
    # Plaintext: "12345678901234567890123456789012" (32 ASCII bytes)
    encryption-key: "MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI="
