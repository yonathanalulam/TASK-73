services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: dojostay
      MYSQL_USER: dojostay
      MYSQL_PASSWORD: dojostay
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DOJOSTAY_DB_URL: jdbc:mysql://mysql:3306/dojostay?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DOJOSTAY_DB_USERNAME: dojostay
      DOJOSTAY_DB_PASSWORD: dojostay
      DOJOSTAY_SECURITY_ENCRYPTION_KEY: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      DOJOSTAY_BOOTSTRAP_ADMIN_USERNAME: admin
      DOJOSTAY_BOOTSTRAP_ADMIN_PASSWORD: ChangeMe!2026Docker
      DOJOSTAY_BOOTSTRAP_SAMPLE_STAFF_USERNAME: staff-hq
      DOJOSTAY_BOOTSTRAP_SAMPLE_STAFF_PASSWORD: StaffPass!2026Docker
    volumes:
      - backend-credentials:/var/lib/dojostay/credentials
      - backend-property-images:/var/lib/dojostay/property-images
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

  backend-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
    environment:
      SPRING_PROFILES_ACTIVE: test

  frontend-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: test

volumes:
  mysql-data:
  backend-credentials:
  backend-property-images:
